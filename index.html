<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Estudiantil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="./Img/akko.jpeg">
    <link rel="icon" href="./Img/akko.jpeg">
    <link rel="icon" href="data:image/x-icon;,"> 
</head>
<body>
    <div class="container">
        <h2>Drive JLCA</h2>
        <p class="subtitle">Almacenamiento seguro para tus reportes, datasheets y proyectos</p>
        
        <div class="upload-box">
            <input type="file" id="fileInput" multiple>
            <br>
            <button onclick="subirArchivo()">Subir Archivo</button>
            <button onclick="crearCarpeta()" style="background: var(--accent); margin-top: 10px;">Crear Carpeta</button>
            <div id="status"></div>
            
            <button id="loginBtn" onclick="toggleLogin()" style="background: #4f46e5; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%;">Login</button>
        </div>

        <div class="file-list-section">
            <h3>Mis Archivos Guardados</h3>
            <ul id="fileList"></ul>
        </div>
    </div>

    <!-- Modal de Login Personalizado -->
    <div id="loginModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 style="margin-top: 0; color: white;">Iniciar Sesión</h3>
            <input type="text" id="usernameInput" placeholder="Usuario" class="modal-input" autocomplete="off">
            <input type="password" id="passwordInput" placeholder="Contraseña" class="modal-input">
            
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button onclick="cerrarModalLogin()" class="btn-modal btn-cancelar">Cancelar</button>
                <button id="confirmLoginBtn" onclick="procesarLogin()" class="btn-modal btn-aceptar">Aceptar</button>
            </div>
        </div>
    </div>

    <!-- NUEVO: Modal para Alertas Bonitas -->
    <div id="alertModal" class="modal-overlay" style="display: none; z-index: 2000;">
        <div class="modal-content" style="max-width: 280px; text-align: center;">
            <p id="alertMessage" style="color: white; margin-top: 0; margin-bottom: 20px; font-weight: 600; font-size: 16px;"></p>
            <button onclick="document.getElementById('alertModal').style.display='none'" class="btn-modal btn-aceptar" style="width: 100%;">Entendido</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .catch(err => console.log('SW Error:', err));
        }
    </script>
</body>
</html>
