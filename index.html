<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Estudiantil</title>
    <!-- Fuente profesional -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="./Img/akko.jpeg">
    <link rel="icon" href="./Img/akko.jpeg">
    <link rel="icon" href="data:image/x-icon;,"> 
</head>
<body>
    <div class="container">
        <h2>Drive  JLCA</h2>
        <p class="subtitle">Almacenamiento seguro para tus reportes, datasheets y proyectos</p>
        
        <div class="upload-box">
            <input type="file" id="fileInput" multiple>
            <br>
            <button onclick="subirArchivo()">Subir Archivo</button>
            <button onclick="crearCarpeta()" style="background: var(--accent); margin-top: 10px;">Crear Carpeta</button>
            <div id="status"></div>
        </div>

        <div class="file-list-section">
            <h3>Mis Archivos Guardados</h3>
            <ul id="fileList"></ul>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .catch(err => console.log('SW Error:', err));
        }
    </script>
</body>
</html>
