<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Estudiantil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="./Img/akko.jpeg">
    <link rel="icon" href="./Img/akko.jpeg">
    <link rel="icon" href="data:image/x-icon;,"> 
</head>
<body>
    <div class="container">
        <h2>Drive JLCA</h2>
        <p class="subtitle">Almacenamiento Personal</p>
        
        <div class="upload-box">
            <input type="file" id="fileInput" multiple>
            <br>
            <button onclick="subirArchivo()">Subir Archivo</button>
            <button onclick="crearCarpeta()" style="background: var(--accent); margin-top: 10px;">Crear Carpeta</button>
            <div id="status"></div>
            
            <button id="loginBtn" onclick="toggleLogin()" style="background: #4f46e5; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%;">Login</button>
            <!-- NUEVO: Botón de Admin -->
            <button id="adminBtn" onclick="abrirAdmin()" style="background: #ef4444; color: white; padding: 10px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; display: none;">Panel de Admin</button>
        </div>

        <div class="file-list-section">
            <h3>Mis Archivos Guardados</h3>
            <ul id="fileList"></ul>
        </div>
    </div>

    <!-- Modales (Login, Carpeta, Alerta, Admin) -->
    <div id="loginModal" class="modal-overlay" style="display: none;"><div class="modal-content">
        <h3 style="margin-top: 0; color: white;">Iniciar Sesión</h3>
        <input type="text" id="usernameInput" placeholder="Usuario" class="modal-input" autocomplete="off">
        <input type="password" id="passwordInput" placeholder="Contraseña" class="modal-input">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="cerrarModalLogin()" class="btn-modal btn-cancelar">Cancelar</button>
            <button id="confirmLoginBtn" onclick="procesarLogin()" class="btn-modal btn-aceptar">Aceptar</button>
        </div>
    </div></div>

    <div id="folderModal" class="modal-overlay" style="display: none; z-index: 2000;"><div class="modal-content">
        <h3 style="margin-top: 0; color: white;">Nueva Carpeta</h3>
        <input type="text" id="folderNameInput" placeholder="Nombre" class="modal-input" autocomplete="off">
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="document.getElementById('folderModal').style.display='none'" class="btn-modal btn-cancelar">Cancelar</button>
            <button onclick="procesarCrearCarpeta()" class="btn-modal btn-aceptar">Crear</button>
        </div>
    </div></div>

    <div id="adminModal" class="modal-overlay" style="display: none; z-index: 2000;"><div class="modal-content">
        <h3 style="color: white;">Gestión de Usuarios</h3>
        <input type="text" id="newUsername" placeholder="Usuario" class="modal-input">
        <input type="password" id="newPassword" placeholder="Contraseña" class="modal-input">
        <button onclick="crearUsuario()" class="btn-modal btn-aceptar" style="width: 100%; margin-bottom: 15px;">Registrar</button>
        <ul id="userList" style="color: white; list-style: none; padding: 0; text-align: left;"></ul>
        <button onclick="document.getElementById('adminModal').style.display='none'" class="btn-modal btn-cancelar" style="width: 100%;">Cerrar</button>
    </div></div>

    <div id="alertModal" class="modal-overlay" style="display: none; z-index: 3000;"><div class="modal-content" style="max-width: 280px; text-align: center;">
        <p id="alertMessage" style="color: white; margin-top: 0; margin-bottom: 20px; font-weight: 600;"></p>
        <button onclick="document.getElementById('alertModal').style.display='none'" class="btn-modal btn-aceptar" style="width: 100%;">Entendido</button>
    </div></div>

    <div id="previewModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center;">
    <div style="background:#1e293b; padding:20px; border-radius:10px; max-width:90%; max-height:90%; position:relative;">
        <button onclick="document.getElementById('previewModal').style.display='none'" style="position:absolute; top:10px; right:10px; cursor:pointer;">❌</button>
        <div id="previewContent" style="overflow:auto; max-height:80vh;"></div>
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
